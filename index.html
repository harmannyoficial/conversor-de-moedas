<!-- Conversor de moedas -->
 <!DOCTYPE html>
 <html lang="pt-BR">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de moedas</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    
</head>

 <body>

    <div id="conteiner">
        <img id="logoimg" src="./assets.jpeg/0b855c3cee7fbceab7a89831e6096fe140b43ca9.gif" alt="Conversor de moedas" >
        
        <div id="conteinercentro">
            
            
            <div id="conversor">
                <h1>Conversor de moedas</h1>

                <div id="d1">  
                    <p>Selecione as moedas de:</p>

 <!--   SITE DAS IMAGEM DA BANDEIRAS  
                    https://icon-icons.com/pt/icones/busca/bandeira-->
                    <select id="select1">
                       <!--para que o java reconheça a imagem precisa adicionar  data-img= -->
                        <option class="USD"value="5.24" data-img="https://images.icon-icons.com/97/PNG/96/united_states_flags_flag_17080.png" >Dólar Americano (USD)</option>
                        <option class="EUR"value="7" data-img="https://images.icon-icons.com/97/PNG/96/europe_flags_flag_16997.png">Euro (EUR)</option>
                        <option class="BRL"value="1" data-img="https://images.icon-icons.com/97/PNG/256/brazil_flags_flag_16979.png" selected >Real Brasileiro (BRL)</option> 
                    </select>
                </div> 

                <div id="d2"> 
                    <p>Selecione as moedas para:</p>
                    <select  id="select2">
                        <option class="USD" value="5.24" data-img="https://images.icon-icons.com/97/PNG/96/united_states_flags_flag_17080.png" selected>Dólar Americano (USD)</option>
                        <option class="EUR" value="7" data-img="https://images.icon-icons.com/97/PNG/96/europe_flags_flag_16997.png">Euro (EUR)</option>
                        <option class="BRL" value="1" data-img="https://images.icon-icons.com/97/PNG/256/brazil_flags_flag_16979.png">Real Brasileiro (BRL)</option>
                    </select>
                </div>

                <div id="d3">
                    <h3>Valor:</h3>
                    <input id= "input1" placeholder=" Digite o valor" type="number">
                </div>

                <button id="button">CONVERTER</button>

                <div>
                    <img class="bandeira1" src="https://images.icon-icons.com/97/PNG/256/brazil_flags_flag_16979.png" >
                    <h4 id="rselect1">R$ 00.00</h4>

                    <img class="bandeira2"src="https://images.icon-icons.com/97/PNG/96/united_states_flags_flag_17080.png" > 
                    <h4 id="rselect2">R$ 00.00</h4>
                    
                </div>
            </div>
        </div>    

    </div>
    
 </body>

 <script src="./arquivo.js"></script>
 </html>
