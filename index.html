 https://icon-icons.com/pt/icones/busca/bandeira

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">

    <title> KLEBER</title>
</head>

<body>
    <img class="logo" src="./assets.jpeg/0b855c3cee7fbceab7a89831e6096fe140b43ca9.gif" alt="logo-convert-money">

    <main>

        <div>
            <h2>conversor de moedas </h2>
        </div>

        <label>
            Converter <b>de</b>
            <select class="currency-select-top" >
                <option  value="brasil">R$ Real Brasileiro</option>
          
            </select>
        </label>

        <label>
            Converter <b>para</b>
            <select class="currency-select">
                <option value="dolar">US$ Dólar americano</option>
                <option value="euro">€ Euro</option>
                <option value="libra">£ Libra</option>
            </select>
        </label>

        <label>
            Valor
            <input class="input-currency" placeholder="R$ 10.000,00" type="number">
        </label>

        <button class="convert-button">Converter</button>

        <section>
            <div class="currency-box">
                <img  class="select1-img" src="./assets.jpeg/brazil.png" all="logo-real">
                <p class="currency" id="select1-name" >Real</p>
                <p class="currency-value-to-convert">R$ 0,00</p>
            </div>

            <!--imagens das bandeiras
            <img src="./assets.jpeg/estadosuni_states_flags_flag_17080.png">  
            <img src="./assets.jpeg/brazil_flags_flag_16979.png">
            <img src="./assets.jpeg/europe_flags_flag_16997.png">
            -->

            <div class="currency-box">
                <img class="currency-img" src="./assets.jpeg/estados.png" all="logo-dolar">
                <p class="currency" id="currency-name">Dólar americano</p>
                <p class="currency-value">US$ 0.0</p>
            </div>
        </section> 
    </main>
</body>
<script src="./index.js"></script>

</html>
